services:
  openmaic:
    build: .
    # ports убраны — недоступен снаружи, доступ только через proxy витрины
    env_file:
      - .env.local
    volumes:
      - openmaic-data:/app/data
    restart: unless-stopped
    networks:
      - openmaic-net
      - ai-gateway-net

volumes:
  openmaic-data:

networks:
  openmaic-net:
    external: true
  ai-gateway-net:
    external: true
    name: ai-gateway_default